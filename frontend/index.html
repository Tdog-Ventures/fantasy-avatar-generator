<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Custom AI Fantasy Avatar Intake</title>
<style>
:root{--navy:#0B1B3A;--navy-light:#1e2a47;--white:#ffffff;--off:#F6F8FC;--yellow:#FFC72C;--text:#0f172a;--muted:#475569;--border:#dbe3f0;--radius:18px;--shadow:0 10px 30px rgba(11,27,58,.12)}
@media (prefers-color-scheme: dark){:root{--navy-light:#0f172a;--white:#1e2937;--off:#0f172a;--text:#f1f5f9;--muted:#94a3b8;--border:#334155}}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;color:var(--text);background:var(--off)}
.wrap{max-width:1100px;margin:0 auto;padding:28px 18px 80px}
header{background:linear-gradient(135deg,var(--navy),#102a57);color:white;border-radius:var(--radius);padding:22px 22px;box-shadow:var(--shadow)}
.card{background:var(--navy-light);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;color:var(--text)}
.btn{border:0;padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s}
.btn.primary{background:var(--yellow);color:#111827}
.btn.dark{background:var(--navy);color:white}
.thumbGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}
.thumb{border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.thumb:hover{transform:scale(1.03);box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.1)}
.thumb img{width:100%;height:160px;object-fit:cover}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">
    <div class="logo"><div class="badge">🔥</div><h1 style="margin:0">Fantasy Avatar Intake</h1></div>
    <a href="#" class="btn primary">Pay $149 – Start Now</a>
  </div>
</header>

<div class="grid" style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px">
  <div class="card">
    <h2>Client Details</h2>
    <form id="form">
      <input type="text" placeholder="Full name or alias" style="width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid var(--border)" required>
      <input type="email" placeholder="Email" style="width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid var(--border)" required>
      <select style="width:100%;padding:12px;margin:8px 0;border-radius:12px;border:1px solid var(--border)">
        <option>Seductive Lingerie</option>
        <option>Dominant Power Play</option>
        <option>Cute & Innocent</option>
        <option>Beach Babe</option>
        <option>Gothic Seductress</option>
        <option>Fitness Goddess</option>
        <option>Anime/Cosplay</option>
        <option>Artistic Nude</option>
        <option>Maid Roleplay</option>
        <option>Intimate Fantasy</option>
      </select>
      <button type="submit" class="btn dark" style="width:100%;margin-top:16px">Submit My Fantasy</button>
    </form>
  </div>

  <div class="card">
    <h2>Fantasy Style Examples</h2>
    <div id="thumbGrid" class="thumbGrid"></div>
  </div>
</div>
</div>

<script>
const styles = [
  {label:"Seductive Lingerie",thumb:"https://picsum.photos/id/1015/800/600"},
  {label:"Dominant Power Play",thumb:"https://picsum.photos/id/201/800/600"},
  {label:"Cute & Innocent",thumb:"https://picsum.photos/id/1005/800/600"},
  {label:"Beach Babe",thumb:"https://picsum.photos/id/1016/800/600"},
  {label:"Gothic Seductress",thumb:"https://picsum.photos/id/133/800/600"},
  {label:"Fitness Goddess",thumb:"https://picsum.photos/id/1009/800/600"}
];

const grid = document.getElementById("thumbGrid");
styles.forEach(s => {
  const div = document.createElement("div");
  div.className = "thumb";
  div.innerHTML = `<img src="${s.thumb}"><div style="padding:8px;font-weight:600">${s.label}</div>`;
  grid.appendChild(div);
});

document.getElementById("form").onsubmit = e => {
  e.preventDefault();
  alert("✅ Fantasy request received. Summary copied!");
};
</script>
</body>
</html>
