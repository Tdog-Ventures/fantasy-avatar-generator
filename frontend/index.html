<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Custom AI Fantasy Avatar Intake</title>
<style>
:root{--navy:#0B1B3A;--navy-light:#1e2a47;--white:#ffffff;--off:#0f172a;--yellow:#FFC72C;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--radius:18px;--shadow:0 10px 30px rgba(11,27,58,.12)}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,sans-serif;color:var(--text);background:var(--off)}
.wrap{max-width:1100px;margin:0 auto;padding:28px 18px 80px}
header{background:linear-gradient(135deg,var(--navy),#102a57);color:white;border-radius:var(--radius);padding:22px 22px;box-shadow:var(--shadow)}
.card{background:var(--navy-light);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;color:var(--text)}
.btn{border:0;padding:12px 20px;border-radius:12px;cursor:pointer;font-weight:700;font-size:14px;transition:all .2s}
.btn.primary{background:var(--yellow);color:#111827}
.btn.dark{background:var(--navy);color:white}
.btn.light{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.3)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px}
@media (max-width:980px){.grid{grid-template-columns:1fr}}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{display:block;font-size:12px;font-weight:800;margin-bottom:6px}
input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:rgba(255,255,255,.05);color:var(--text)}
.thumbGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:16px}
.thumb{border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s}
.thumb:hover{transform:scale(1.03);box-shadow:0 20px 25px -5px rgb(0 0 0 / 0.2)}
.thumb img{width:100%;height:160px;object-fit:cover}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="brand">
    <div class="logo"><div class="badge">🔥</div><h1 style="margin:0">Fantasy Avatar Intake</h1></div>
    <a href="#" class="btn primary">Pay $149 – Start Now</a>
  </div>
</header>

<div class="grid">
  <!-- Left: Client Details -->
  <div class="card">
    <h2>Client Details</h2>
    <p class="sub">Tell me everything I need to make your fantasy come alive. The dirtier the details, the better the result 😈</p>
    
    <form id="intakeForm">
      <div class="row">
        <div><label>Full name or alias <span style="color:#dc2626">*</span></label><input id="name" type="text" placeholder="e.g., Goddess Luna" required></div>
        <div><label>Email <span style="color:#dc2626">*</span></label><input id="email" type="email" placeholder="your secret email" required></div>
      </div>

      <div style="margin-top:16px">
        <label>Pick your fantasy style <span style="color:#dc2626">*</span></label>
        <select id="style"></select>
      </div>

      <div style="margin-top:16px">
        <label>Upsell extras</label>
        <div id="extrasRow" style="display:flex;gap:8px;flex-wrap:wrap"></div>
      </div>

      <div class="row" style="margin-top:16px">
        <div><label>Upload reference selfies (required) <span style="color:#dc2626">*</span></label><input id="selfie" type="file" accept="image/*" multiple></div>
        <div><label>Optional OnlyFans / Social URL</label><input id="profileUrl" type="url" placeholder="https://onlyfans.com/..."></div>
      </div>

      <textarea id="notes" style="height:120px;margin-top:16px" placeholder="Be as explicit as you want..."></textarea>

      <div style="margin-top:24px;display:flex;gap:12px">
        <button type="submit" class="btn dark" style="flex:1">Submit My Fantasy</button>
        <button type="button" id="copyBtn" class="btn light">Copy Summary</button>
      </div>
    </form>
  </div>

  <!-- Right: Style Examples -->
  <div class="card">
    <h2>Fantasy Style Examples</h2>
    <p class="sub">Click any thumbnail — these are the vibes you'll get.</p>
    <div id="thumbGrid" class="thumbGrid"></div>
  </div>
</div>
</div>

<script>
const styles = [
  {label:"Seductive Lingerie", tag:"LINGERIE", thumb:"https://picsum.photos/id/1015/800/600"},
  {label:"Dominant Power Play", tag:"DOM", thumb:"https://picsum.photos/id/201/800/600"},
  {label:"Cute & Innocent", tag:"INNOCENT", thumb:"https://picsum.photos/id/1005/800/600"},
  {label:"Beach Babe", tag:"BEACH", thumb:"https://picsum.photos/id/1016/800/600"},
  {label:"Gothic Seductress", tag:"GOTH", thumb:"https://picsum.photos/id/133/800/600"},
  {label:"Fitness Goddess", tag:"FIT", thumb:"https://picsum.photos/id/1009/800/600"},
  {label:"Anime/Cosplay", tag:"COSPLAY", thumb:"https://picsum.photos/id/201/800/600"},
  {label:"Artistic Nude", tag:"NUDE", thumb:"https://picsum.photos/id/1011/800/600"},
  {label:"Maid Roleplay", tag:"MAID", thumb:"https://picsum.photos/id/133/800/600"},
  {label:"Intimate Fantasy", tag:"FANTASY", thumb:"https://picsum.photos/id/160/800/600"}
];

const styleSelect = document.getElementById("style");
const thumbGrid = document.getElementById("thumbGrid");

styles.forEach(s => {
  const opt = document.createElement("option");
  opt.value = s.label;
  opt.textContent = s.label;
  styleSelect.appendChild(opt);

  const thumb = document.createElement("div");
  thumb.className = "thumb";
  thumb.innerHTML = `<div class="img"><span class="tag">${s.tag}</span><img src="${s.thumb}" alt="${s.label}"></div><div class="cap">${s.label}</div>`;
  thumb.onclick = () => {
    document.querySelectorAll(".thumb").forEach(t => t.classList.remove("selected"));
    thumb.classList.add("selected");
    styleSelect.value = s.label;
  };
  thumbGrid.appendChild(thumb);
});

document.getElementById("intakeForm").onsubmit = e => {
  e.preventDefault();
  alert("✅ Fantasy submitted! Summary copied to clipboard.");
  navigator.clipboard.writeText("FANTASY AVATAR REQUEST - Ready for processing");
};
</script>
</body>
</html>
